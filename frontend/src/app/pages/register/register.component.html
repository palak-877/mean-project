<div class="auth-container">

  <div class="auth-card">
    <h2>Create Account ✨</h2>
    <p class="subtitle">Join Wisdom GPT</p>

    <input 
      type="email" 
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input 
      type="password" 
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button (click)="register()">Register</button>

    <p class="switch">
      Already have an account?
      <span (click)="goToLogin()">Login</span>
    </p>

  </div>

</div>
