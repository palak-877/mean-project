<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>History</h3>
    <button class="new-chat-btn" (click)="newChat()">+ New Chat</button>
    <div class="history">
      <div *ngFor="let item of history" class="history-item" (click)="openChat(item)">
      {{ item.title }}
    </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="chat-area">

    <!-- Header -->
    <div class="header">
      <h2>Wisdom GPT</h2>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Messages -->
    <div class="messages" #scrollContainer>
      <div *ngFor="let msg of messages">

        <p class="question"><b>You:</b> {{ msg.question }}</p>
        <p class="answer"><b>AI:</b> {{ msg.answer }}</p>

      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input [(ngModel)]="question" placeholder="Ask something..." />
      <button (click)="sendMessage()">Send</button>
    </div>

  </div>

</div>
